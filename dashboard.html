<!DOCTYPE html>
<html lang="ja" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アポイント管理ダッシュボード</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans JP', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 900: '#312e81' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-100 min-h-screen p-4 md:p-8 font-sans relative overflow-x-hidden">
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-600/20 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <div class="max-w-5xl mx-auto relative z-10 space-y-8">
        <header class="pt-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold mb-2 text-white">アポイント管理</h1>
                <p class="text-gray-400">訪問先の事前入力と履歴の管理</p>
            </div>
            <div class="flex gap-3">
                <button onclick="document.getElementById('templateModal').classList.remove('hidden')" class="bg-gray-700 hover:bg-gray-600 border border-gray-600 text-white font-bold py-2 px-4 rounded-lg shadow transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    テンプレート管理
                </button>
                <button onclick="document.getElementById('createModal').classList.remove('hidden')" class="bg-brand-600 hover:bg-brand-500 text-white font-bold py-2 px-6 rounded-lg shadow transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    新規アポイント作成
                </button>
            </div>
        </header>

        <div class="glass-panel rounded-2xl p-6 shadow-xl">
            <h2 class="text-xl font-bold text-white mb-6 border-b border-gray-700 pb-2">登録済みアポイント一覧</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="text-xs text-gray-400 uppercase bg-gray-800/50 rounded-t-lg">
                        <tr>
                            <th class="px-4 py-3 rounded-tl-lg">企業名</th>
                            <th class="px-4 py-3">対象者</th>
                            <th class="px-4 py-3">既存システム</th>
                            <th class="px-4 py-3">ステータス</th>
                            <th class="px-4 py-3 rounded-tr-lg text-right">アクション</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentList" class="divide-y divide-gray-700">
                        <!-- Items will be injected here -->
                    </tbody>
                </table>
                <div id="loadingIndicator" class="text-center py-8 text-gray-400">読み込み中...</div>
            </div>
        </div>
    </div>

    <!-- Create Modal -->
    <div id="createModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-xl p-6 w-full max-w-md shadow-2xl border border-slate-700">
            <h2 class="text-xl font-bold text-white mb-4">新規アポイントの事前入力</h2>
            <form id="createForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">企業名</label>
                    <input type="text" id="newCompany" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:border-brand-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">対象者名</label>
                    <input type="text" id="newTarget" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:border-brand-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">既存システム名</label>
                    <input type="text" id="newSystem" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:border-brand-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">ヒアリングテンプレート</label>
                    <select id="newTemplate" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:border-brand-500 outline-none">
                        <option value="">読込中...</option>
                    </select>
                </div>
                <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-700">
                    <button type="button" onclick="document.getElementById('createModal').classList.add('hidden')" class="px-4 py-2 text-gray-300 hover:text-white transition">キャンセル</button>
                    <button type="submit" class="bg-brand-600 hover:bg-brand-500 px-6 py-2 rounded-lg text-white font-bold transition">作成</button>
                </div>
            </form>
        </div>
    </div> <!-- /createModal -->

    <!-- Create/Edit Template Modal -->
    <div id="templateModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-xl p-6 w-full max-w-4xl shadow-2xl border border-slate-700 max-h-[90vh] h-[85vh] flex flex-col">
            <h2 class="text-xl font-bold text-white mb-2">テンプレートの登録・編集</h2>
            
            <div class="mb-4 p-3 bg-gray-900/50 rounded-lg border border-gray-700">
                <label class="block text-xs font-medium text-gray-400 mb-1">▼ 既存のテンプレートを編集する場合</label>
                <select id="editTemplateSelect" onchange="loadTemplateToEdit()" class="w-full bg-slate-800 border border-slate-600 rounded px-3 py-1.5 text-sm text-gray-300 outline-none focus:border-brand-500">
                    <option value="">-- 新規作成 --</option>
                </select>
            </div>

            <form id="templateForm" class="space-y-4 flex-1 flex flex-col min-h-0">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">ファイル名 (英数字推奨)</label>
                    <input type="text" id="tplFilename" placeholder="例: retail.yml" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:border-brand-500 outline-none font-mono">
                </div>
                <div class="flex-1 flex flex-col min-h-0">
                    <label class="block text-sm font-medium text-gray-300 mb-1">YAML本文</label>
                    <textarea id="tplContent" required class="w-full flex-1 bg-slate-900 border border-slate-600 rounded-lg p-4 text-white focus:border-brand-500 outline-none font-mono text-sm resize-y min-h-[300px]" placeholder="name: &quot;テンプレート名&quot;&#10;questions:&#10;  - id: &quot;q1&quot;..."></textarea>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-slate-700 mt-auto">
                    <button type="button" onclick="document.getElementById('templateModal').classList.add('hidden')" class="px-4 py-2 text-gray-300 hover:text-white transition">キャンセル</button>
                    <button type="submit" class="bg-gray-600 hover:bg-gray-500 px-6 py-2 rounded-lg text-white font-bold transition">保存する</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api/appointments';

        async function loadAppointments() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const tbody = document.getElementById('appointmentList');
                document.getElementById('loadingIndicator').classList.add('hidden');
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">アポイントがありません。新規作成してください。</td></tr>';
                    return;
                }

                tbody.innerHTML = data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map(apt => `
                    <tr class="hover:bg-gray-800/30 transition">
                        <td class="px-4 py-4 font-medium text-white">${apt.companyName || '未入力'}</td>
                        <td class="px-4 py-4 text-gray-300">${apt.targetName || '-'}</td>
                        <td class="px-4 py-4 text-gray-300">${apt.systemName || '-'}</td>
                        <td class="px-4 py-4">
                            ${apt.status === 'completed' 
                                ? '<span class="bg-green-500/20 text-green-400 px-2 py-1 rounded text-xs border border-green-500/30">ヒアリング済</span>' 
                                : '<span class="bg-brand-500/20 text-brand-400 px-2 py-1 rounded text-xs border border-brand-500/30">未実施</span>'}
                        </td>
                        <td class="px-4 py-4 text-right">
                            <a href="index.html?id=${apt.id}" class="inline-flex items-center gap-1 text-brand-400 hover:text-brand-300 font-medium transition">
                                ${apt.status === 'completed' ? '結果を確認' : 'ヒアリング開始'} 
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </a>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('loadingIndicator').innerText = 'データの読み込みに失敗しました。サーバーが起動しているか確認してください。';
            }
        }

        async function loadTemplates() {
            try {
                const res = await fetch('http://localhost:3001/api/templates');
                if (res.ok) {
                    const templates = await res.json();
                    
                    // Update New Appointment Dropdown
                    const select = document.getElementById('newTemplate');
                    select.innerHTML = templates.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

                    // Update Edit Template Dropdown
                    const editSelect = document.getElementById('editTemplateSelect');
                    editSelect.innerHTML = '<option value="">-- 新規作成 --</option>' + templates.map(t => `<option value="${t.id}">${t.id} (${t.name})</option>`).join('');
                }
            } catch (err) {
                console.error("Failed to load templates", err);
                document.getElementById('newTemplate').innerHTML = '<option value="default.yml">デフォルトテンプレート</option>';
            }
        }

        async function loadTemplateToEdit() {
            const filename = document.getElementById('editTemplateSelect').value;
            if (!filename) {
                document.getElementById('templateForm').reset();
                return;
            }
            try {
                // Fetch raw YAML file
                const res = await fetch(`http://localhost:3001/templates/${filename}`);
                if (res.ok) {
                    const yamlText = await res.text();
                    document.getElementById('tplFilename').value = filename;
                    document.getElementById('tplContent').value = yamlText;
                } else {
                    alert('テンプレートの読み込みに失敗しました');
                }
            } catch (e) {
                console.error(e);
            }
        }

        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                companyName: document.getElementById('newCompany').value,
                targetName: document.getElementById('newTarget').value,
                systemName: document.getElementById('newSystem').value,
                templateId: document.getElementById('newTemplate').value
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    document.getElementById('createModal').classList.add('hidden');
                    document.getElementById('createForm').reset();
                    loadAppointments();
                } else {
                    alert('サーバーエラーが発生しました（ステータス: ' + res.status + '）。サーバーが起動しているか確認してください。');
                }
            } catch (err) {
                console.error(err);
                alert('作成に失敗しました。サーバー(http://localhost:3001)に接続できません。');
            }
        });

        document.getElementById('templateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                filename: document.getElementById('tplFilename').value,
                content: document.getElementById('tplContent').value
            };

            try {
                const res = await fetch('http://localhost:3001/api/templates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    alert('テンプレートを保存しました！');
                    document.getElementById('templateModal').classList.add('hidden');
                    document.getElementById('templateForm').reset();
                    loadTemplates(); // Refresh dropdown
                } else {
                    const err = await res.json();
                    alert('保存に失敗しました: ' + (err.error || res.status));
                }
            } catch (err) {
                console.error(err);
                alert('通信エラーが発生しました。');
            }
        });

        // Initialize
        loadAppointments();
        loadTemplates();
    </script>
</body>
</html>
