name: "製造業・基本ヒアリング"
description: "受注から生産、在庫までを網羅する製造業向けの標準セット"
questions:
  - id: "q1"
    label: "受注・販売管理"
    subLabel: "手入力・目視チェックの有無"
    talkScript: "受注から出荷指示まで、システム上で完結していますか？イレギュラー対応で人が目視チェックしている部分はありますか？"
    lowLabel: "アナログ・手入力"
    highLabel: "システム完結"
    feedbacks:
      1: "手作業が多く、ミスが起きやすい属人的な状態ですね。"
      2: "Excel等で補完されていますが、二重入力の手間がありそうです。"
      3: "標準的ですが、イレギュラー対応で人がカバーしている部分がありますね。"
      4: "大部分がシステム化されていて素晴らしいです。"
      5: "完全にシステム上で完結しており、理想的な状態です！"

  - id: "q2"
    label: "在庫管理"
    subLabel: "実在庫とのズレ・月末調整"
    talkScript: "システム上の数字と現場の実在庫のズレってどのくらい発生しますか？ 月末に見えない『帳尻合わせ』の作業はありませんか？"
    lowLabel: "ズレが多い"
    highLabel: "正確・リアルタイム"
    feedbackHigh: "在庫の精度が高いのは流石です。"
    feedbackLow: "ズレが生じる一番の原因は何だとお考えですか？（現場の入力漏れ、不良品の発生など）"

  - id: "q3"
    label: "生産計画・製造管理"
    subLabel: "現場での裏計画"
    talkScript: "計画を組む際、結局現場の職長さんが頭の中で『裏の計画』を組み直していませんか？（段取り替えの効率化など）"
    lowLabel: "現場が組み直し"
    highLabel: "計画通りに稼働"
    feedbackHigh: "現場とシステムがしっかり連動しているんですね。"
    feedbackLow: "特定の職長さんがお休みの際などは、他の方でも回せるようなルールや判断基準は共有されていますか？"

  - id: "q4"
    label: "発注・需要予測"
    subLabel: "発注判断のブラックボックス化"
    talkScript: "発注数量って、最終的にはどなたが決めていますか？システムの推奨値のままいけますか？それとも経験則を加味されますか？"
    lowLabel: "完全に属人化"
    highLabel: "システムが自動算出"
    feedbackHigh: "属人化が排除されていて理想的です。"
    feedbackLow: "最終的にはやはり経験則が必要になるのですね。それはシステムに落とし込むのが難しい暗黙知でしょうか？"

  - id: "q5"
    label: "システム間連携"
    subLabel: "データの二重入力・分断"
    talkScript: "製造現場での記録（紙やタブレットなど）を、事務所で基幹システムに打ち直すような『見えない二重入力』は発生していませんか？"
    lowLabel: "分断・手動転記"
    highLabel: "シームレスな連携"
    feedbackHigh: "データの分断がなくシームレスですね。"
    feedbackLow: "現場で入力したものを、事務所で打ち直す手間が常態化してしまっているのですね。"
