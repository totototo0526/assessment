name: "ソーマ化粧品様向け（化粧品製造・既存システムあり）"
description: "既存システム運用企業向け。Excel・属人化・システム間連携・品質保証・AI活用の余地を探るヒアリングテンプレート。"

questions:
  - id: "q1"
    label: "受注・販売管理"
    subLabel: "得意先ごとの個別対応"
    talkScript: >
      得意先様ごとの帳票指定や、
      ロット指定、送り状の形式など、
      システムだけでは対応しきれないケースってありますか？
    lowLabel: "Excel・手作業"
    highLabel: "完全システム化"
    feedbacks:
      1: "ほぼすべての得意先で手作業やExcelによる個別対応が発生しています。"
      2: "システムでカバーしきれない部分が多く、現場の負担が大きいです。"
      3: "一部のイレギュラーな得意先のみ、属人的な対応が残っています。"
      4: "大部分がシステムで自動処理されており、例外は少数です。"
      5: "完全にシステム化され、個別対応は不要（または自動化）となっています。"
    followups:
      - "最終的にExcelを触る人っていますか？"
      - "その作業は毎日発生しますか？"
      - "誰しか出来ない作業になっていますか？"
      - "その作業時間はどのくらいですか？"

  - id: "q2"
    label: "在庫・ロット管理"
    subLabel: "トレーサビリティ"
    talkScript: >
      万が一お問い合わせや回収が必要になった場合、
      原料から製品までどのくらいで追跡できますか？
    lowLabel: "紙・Excel"
    highLabel: "即時検索"
    feedbacks:
      1: "紙の伝票や台帳を探し出す必要があり、追跡に多大な時間がかかります。"
      2: "Excelやシステム化はされていますが、複数ファイルにまたがり検索性が低いです。"
      3: "標準的な時間はかかりますが、システム上で追跡できる状態です。"
      4: "システムで一元管理されており、迅速なトレーサビリティが確保されています。"
      5: "完全に紐付けられ、ワンクリックで原料から製品まで即時検索可能です。"
    followups:
      - "どのシステムで確認されますか？"
      - "全部一つの画面で見られますか？"
      - "紙を探すことはありますか？"
      - "担当者がいなくても追跡できますか？"

  - id: "q3"
    label: "製造計画"
    subLabel: "段取り・順番決め"
    talkScript: >
      製造順や洗浄タイミングなど、
      現場の段取りって最終的には
      ベテランの方が決めていますか？
    lowLabel: "経験・勘"
    highLabel: "システム最適化"
    feedbacks:
      1: "完全に特定のベテラン社員の経験と勘に依存しており、ブラックボックス化しています。"
      2: "基本ルールはあるものの、最終調整は人に依存している状態です。"
      3: "Excel等のツールを用いて、一定の基準で属人化を排除しつつ計画されています。"
      4: "システムベースでスケジューリングされ、誰でも同じ計画が立てられます。"
      5: "システム（またはAI）が制約条件を加味し、最適な計画を自動生成しています。"
    followups:
      - "その判断基準って文書化されていますか？"
      - "新人の方でも同じ判断ができますか？"
      - "急な予定変更はどう対応していますか？"
      - "AIで出来そうだと思いますか？"

  - id: "q4"
    label: "発注管理"
    subLabel: "需要予測"
    talkScript: >
      原料や容器の発注って、
      システムが出した数字をそのまま使っていますか？
      それとも最後は経験で調整されていますか？
    lowLabel: "経験判断"
    highLabel: "データ活用"
    feedbacks:
      1: "過去の実績や勘を頼りに、担当者が都度手計算して発注しています。"
      2: "システム情報は参考にしつつも、最終的には大きく経験で調整しています。"
      3: "システムが算出した基準値をもとに、微調整のみを行っています。"
      4: "システムが算出した所要量をほぼそのまま発注に活用できています。"
      5: "需要予測や季節要因をデータで加味し、システムが高度な自動発注を行っています。"
    followups:
      - "最後にOKを出すのは誰ですか？"
      - "その人がお休みの時はどうしていますか？"
      - "過去データは活用されていますか？"
      - "季節要因などはどのように加味されていますか？"

  - id: "q5"
    label: "品質管理"
    subLabel: "検査結果"
    talkScript: >
      QCの検査結果や計量結果は、
      現場で入力されていますか？
      それとも後から事務所で入力されていますか？
    lowLabel: "紙・二重入力"
    highLabel: "リアルタイム連携"
    feedbacks:
      1: "現場では紙に記録し、後から事務所でシステムやExcelへ二重入力しています。"
      2: "現場で一部入力していますが、依然として紙の記録も併用されています。"
      3: "指定の端末から現場で入力が行われていますが、機器連携まではされていません。"
      4: "タブレット等で現場完結しており、二重入力はほぼ発生しません。"
      5: "検査機器や計量器からシステムへデータが直接・リアルタイムに連携されています。"
    followups:
      - "現場では紙を使っていますか？"
      - "入力し直す作業はありますか？"
      - "入力ミスは起きますか？"
      - "タブレット化はされていますか？"

  - id: "q6"
    label: "システム連携"
    subLabel: "システム間の橋渡し"
    talkScript: >
      基幹システムだけで業務は完結していますか？
      それともExcelや別システムを行き来する場面がありますか？
    lowLabel: "分断"
    highLabel: "一気通貫"
    feedbacks:
      1: "システム間が完全に分断されており、データの転記や手入力が頻発しています。"
      2: "CSVの出力・加工・取込といった手作業のシステム間連携が残っています。"
      3: "一部の基幹業務は連携済ですが、周辺業務でExcelを行き来しています。"
      4: "主要なシステム間はAPI等で連携され、データの分断はほぼありません。"
      5: "全システムが一気通貫でシームレスに連携されており、転記作業はゼロです。"
    followups:
      - "CSVはよく使われますか？"
      - "転記作業はありますか？"
      - "データをコピーすることはありますか？"
      - "連携できれば無くなる作業はありますか？"

  - id: "q7"
    label: "AI・今後の構想"
    subLabel: "改善余地"
    talkScript: >
      今後AIや新しい仕組みを使うとしたら、
      一番楽になったらいいなと思う業務はありますか？
    lowLabel: "未検討"
    highLabel: "具体的構想あり"
    feedbacks:
      1: "日々の業務に追われており、新しい仕組みやAIの活用は全く検討できていません。"
      2: "関心はありますが、自社でどう活用できるかのイメージが湧いていません。"
      3: "改善したい業務の課題は明確になっており、手段を探している段階です。"
      4: "AIや新ツールの活用について、社内で前向きな検討やリサーチが進んでいます。"
      5: "具体的な活用シナリオとロードマップがあり、既に導入・検証フェーズに入っています。"
    followups:
      - "AIに期待していることは何ですか？"
      - "逆にAIでは難しいと思う業務はありますか？"
      - "法改正対応などは負担になっていますか？"
      - "もし一つだけ改善できるなら何を変えたいですか？"