name: "ソーマ化粧品様向け（化粧品製造・既存システムあり）"
description: "既存システム運用企業向け。Excel・属人化・システム間連携・品質保証・AI活用の余地を探るヒアリングテンプレート。"

questions:
  - id: "q1"
    label: "受注・販売管理"
    subLabel: "得意先ごとの個別対応"

    talkScript: >
      得意先様ごとの帳票指定や、
      ロット指定、送り状の形式など、
      システムだけでは対応しきれないケースってありますか？

    lowLabel: "Excel・手作業"
    highLabel: "完全システム化"

    followups:
      - "最終的にExcelを触る人っていますか？"
      - "その作業は毎日発生しますか？"
      - "誰しか出来ない作業になっていますか？"
      - "その作業時間はどのくらいですか？"

  - id: "q2"
    label: "在庫・ロット管理"
    subLabel: "トレーサビリティ"

    talkScript: >
      万が一お問い合わせや回収が必要になった場合、
      原料から製品までどのくらいで追跡できますか？

    lowLabel: "紙・Excel"
    highLabel: "即時検索"

    followups:
      - "どのシステムで確認されますか？"
      - "全部一つの画面で見られますか？"
      - "紙を探すことはありますか？"
      - "担当者がいなくても追跡できますか？"

  - id: "q3"
    label: "製造計画"
    subLabel: "段取り・順番決め"

    talkScript: >
      製造順や洗浄タイミングなど、
      現場の段取りって最終的には
      ベテランの方が決めていますか？

    lowLabel: "経験・勘"
    highLabel: "システム最適化"

    followups:
      - "その判断基準って文書化されていますか？"
      - "新人の方でも同じ判断ができますか？"
      - "急な予定変更はどう対応していますか？"
      - "AIで出来そうだと思いますか？"

  - id: "q4"
    label: "発注管理"
    subLabel: "需要予測"

    talkScript: >
      原料や容器の発注って、
      システムが出した数字をそのまま使っていますか？
      それとも最後は経験で調整されていますか？

    lowLabel: "経験判断"
    highLabel: "データ活用"

    followups:
      - "最後にOKを出すのは誰ですか？"
      - "その人がお休みの時はどうしていますか？"
      - "過去データは活用されていますか？"
      - "季節要因などはどのように加味されていますか？"

  - id: "q5"
    label: "品質管理"
    subLabel: "検査結果"

    talkScript: >
      QCの検査結果や計量結果は、
      現場で入力されていますか？
      それとも後から事務所で入力されていますか？

    lowLabel: "紙・二重入力"
    highLabel: "リアルタイム連携"

    followups:
      - "現場では紙を使っていますか？"
      - "入力し直す作業はありますか？"
      - "入力ミスは起きますか？"
      - "タブレット化はされていますか？"

  - id: "q6"
    label: "システム連携"
    subLabel: "システム間の橋渡し"

    talkScript: >
      基幹システムだけで業務は完結していますか？
      それともExcelや別システムを行き来する場面がありますか？

    lowLabel: "分断"
    highLabel: "一気通貫"

    followups:
      - "CSVはよく使われますか？"
      - "転記作業はありますか？"
      - "データをコピーすることはありますか？"
      - "連携できれば無くなる作業はありますか？"

  - id: "q7"
    label: "AI・今後の構想"
    subLabel: "改善余地"

    talkScript: >
      今後AIや新しい仕組みを使うとしたら、
      一番楽になったらいいなと思う業務はありますか？

    lowLabel: "未検討"
    highLabel: "具体的構想あり"

    followups:
      - "AIに期待していることは何ですか？"
      - "逆にAIでは難しいと思う業務はありますか？"
      - "法改正対応などは負担になっていますか？"
      - "もし一つだけ改善できるなら何を変えたいですか？"