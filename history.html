<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロンプト保存履歴</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            500: '#6366f1',
                            600: '#4f46e5',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0f172a] text-gray-100 min-h-screen p-8 font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">保存されたプロンプト履歴</h1>
            <a href="index.html" class="text-brand-400 hover:text-brand-300 underline">診断ページに戻る</a>
        </header>

        <div id="historyList" class="space-y-6">
            <!-- Items will be injected here -->
        </div>
        
        <div class="mt-8 text-right">
            <button onclick="clearHistory()" class="text-red-400 hover:text-red-300 text-sm underline">履歴をすべて削除</button>
        </div>
    </div>

    <script>
        function loadHistory() {
            const savedPrompts = JSON.parse(localStorage.getItem('savedPrompts') || '[]');
            const listEl = document.getElementById('historyList');
            
            if (savedPrompts.length === 0) {
                listEl.innerHTML = '<p class="text-gray-400">保存されたプロンプトはありません。</p>';
                return;
            }

            // Reverse to show newest first
            savedPrompts.reverse();

            listEl.innerHTML = savedPrompts.map((item, index) => `
                <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 shadow-lg">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h2 class="text-lg font-bold text-white">${item.history} の診断結果</h2>
                            <p class="text-xs text-gray-400">${item.date}</p>
                        </div>
                        <button onclick="copyText(${index})" id="copyBtn-${index}" class="bg-brand-600 hover:bg-brand-500 text-white text-sm font-bold py-2 px-4 rounded transition-colors flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            コピーする
                        </button>
                    </div>
                    <textarea id="prompt-${index}" class="w-full h-32 bg-gray-900 border border-gray-600 rounded p-3 text-sm text-gray-300 font-mono resize-none focus:outline-none" readonly>${item.prompt}</textarea>
                </div>
            `).join('');
        }

        function copyText(index) {
            const textarea = document.getElementById(`prompt-${index}`);
            textarea.select();
            navigator.clipboard.writeText(textarea.value).then(() => {
                const btn = document.getElementById(`copyBtn-${index}`);
                const originalText = btn.innerHTML;
                btn.innerHTML = 'コピーしました！';
                btn.classList.add('bg-green-600');
                btn.classList.remove('bg-brand-600');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-green-600');
                    btn.classList.add('bg-brand-600');
                }, 2000);
            });
        }

        function clearHistory() {
            if (confirm("すべての履歴を削除してよろしいですか？")) {
                localStorage.removeItem('savedPrompts');
                loadHistory();
            }
        }

        // Initialize
        loadHistory();
    </script>
</body>
</html>
